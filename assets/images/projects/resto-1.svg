  <rect x="30" y="20" width="120" height="16" rx="3" fill="#fff" opacity="0.8"/>
  <rect x="650" y="20" width="40" height="16" rx="3" fill="#4ade80" opacity="0.8"/>
  <rect x="700" y="20" width="60" height="16" rx="3" fill="#fff" opacity="0.4"/>

  <!-- Sol panel: kategoriler -->
  <g transform="translate(30, 80)">
    <rect width="150" height="340" rx="10" fill="#fff" opacity="0.08"/>
    <rect x="15" y="20" width="80" height="10" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="15" y="50" width="120" height="36" rx="6" fill="#001F3F"/>
    <rect x="30" y="64" width="80" height="8" rx="2" fill="#fff" opacity="0.85"/>
    <rect x="15" y="98" width="120" height="36" rx="6" fill="#fff" opacity="0.1"/>
    <rect x="30" y="112" width="70" height="8" rx="2" fill="#fff" opacity="0.6"/>
